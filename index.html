<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>頻率療癒</title>
    <style>
        :root {
            --bg-color: #f4f1ea; 
            --text-primary: #5a5047; 
            --text-secondary: #a39a92; 
            --btn-bg: #ffffff; 
            --btn-active: #daddd8; 
            --timer-active: #a8dadc;
            --shadow: 0 4px 12px rgba(90, 80, 71, 0.08); 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation; 
        }

        header { margin-bottom: 30px; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 0.2em; font-size: 1.4rem; margin: 0; }
        .subtitle { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 0.1em; margin-top: 10px; }

        /* 九宮格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1; 
        }

        .btn {
            background: var(--btn-bg);
            border: none;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            padding: 10px;
            -webkit-user-select: none; user-select: none;
        }
        .btn:active { transform: scale(0.96); }
        .btn.playing { background-color: var(--btn-active); box-shadow: inset 0 2px 6px rgba(0,0,0,0.05); }
        .label { font-size: 1rem; font-weight: 400; margin-bottom: 4px; }
        .hz { font-size: 0.75rem; color: var(--text-secondary); font-weight: 300; }

        /* 定時器區域 */
        .timer-section {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .timer-btn {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .timer-btn.active {
            background-color: var(--text-primary);
            color: white;
            border-color: var(--text-primary);
        }
        
        .status-text {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            height: 1em; /* 預留空間 */
        }

        footer { margin-top: 40px; font-size: 0.7rem; color: var(--text-secondary); opacity: 0.6; letter-spacing: 0.1em; }
    </style>
</head>
<body>

<header>
    <h1>頻率療癒</h1>
    <div class="subtitle">Frequency Healing</div>
</header>

<main class="grid-container">
    <button class="btn" onclick="toggleSound(432, this)"><span class="label">睡眠</span><span class="hz">432 Hz</span></button>
    <button class="btn" onclick="toggleSound(741, this)"><span class="label">溫習</span><span class="hz">741 Hz</span></button>
    <button class="btn" onclick="toggleSound(147, this)"><span class="label">止痛</span><span class="hz">147 Hz</span></button>
    
    <button class="btn" onclick="toggleSound(528, this)"><span class="label">正面</span><span class="hz">528 Hz</span></button>
    <button class="btn" onclick="toggleSound(396, this)"><span class="label">安全</span><span class="hz">396 Hz</span></button>
    <button class="btn" onclick="toggleSound(639, this)"><span class="label">幸福</span><span class="hz">639 Hz</span></button>
    
    <button class="btn" onclick="toggleSound(852, this)"><span class="label">平靜</span><span class="hz">852 Hz</span></button>
    <button class="btn" onclick="toggleSound(285, this)"><span class="label">修復</span><span class="hz">285 Hz</span></button>
    <button class="btn" onclick="toggleSound(963, this)"><span class="label">靈性</span><span class="hz">963 Hz</span></button>
</main>

<div class="timer-section">
    <button class="timer-btn" onclick="setTimer(15, this)">15 min</button>
    <button class="timer-btn" onclick="setTimer(30, this)">30 min</button>
    <button class="timer-btn" onclick="setTimer(60, this)">60 min</button>
    <button class="timer-btn" onclick="cancelTimer(this)">❌</button>
</div>
<div class="status-text" id="statusMsg"></div>

<footer>MINIMALIST SOUNDS</footer>

<script>
    let audioCtx = null;
    let currentOscillator = null;
    let currentGainNode = null;
    let currentBtn = null;
    let timerId = null;

    function toggleSound(hz, btn) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        if (currentOscillator) {
            stopSoundSmoothly();
            currentBtn.classList.remove('playing');
            if (currentBtn === btn) {
                currentOscillator = null;
                currentBtn = null;
                return;
            }
        }
        playFrequency(hz);
        btn.classList.add('playing');
        currentBtn = btn;
    }

    function playFrequency(hz) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(hz, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5); 
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        currentOscillator = oscillator;
        currentGainNode = gainNode;
    }

    function stopSoundSmoothly() {
        if (currentGainNode && currentOscillator) {
            const now = audioCtx.currentTime;
            currentGainNode.gain.cancelScheduledValues(now);
            currentGainNode.gain.setValueAtTime(currentGainNode.gain.value, now);
            // 3秒鐘慢慢淡出，瞓覺一流
            currentGainNode.gain.linearRampToValueAtTime(0, now + 3);
            
            let oscToStop = currentOscillator;
            setTimeout(() => {
                oscToStop.stop();
                oscToStop.disconnect();
            }, 3100);
        }
    }

    // 定時器邏輯
    function setTimer(minutes, btn) {
        // 清除舊定時
        if (timerId) clearTimeout(timerId);
        
        // 更新按鈕樣式
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        // 顯示狀態
        document.getElementById('statusMsg').innerText = `將於 ${minutes} 分鐘後關閉`;

        // 啟動倒數
        timerId = setTimeout(() => {
            if (currentOscillator) {
                stopSoundSmoothly();
                if (currentBtn) currentBtn.classList.remove('playing');
                currentBtn = null;
                currentOscillator = null;
            }
            document.getElementById('statusMsg').innerText = "已自動關閉";
            document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        }, minutes * 60 * 1000);
    }

    function cancelTimer(btn) {
        if (timerId) clearTimeout(timerId);
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('statusMsg').innerText = "";
    }
</script>
</body>
</html>
