<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>頻率療癒 Frequency Healing Pro</title>
    <style>
        /* Apple-like minimalist UI structure */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            min-height: 100vh;
            text-align: center;
            
            /* 👇👇 加入你上載的 Google Drive 相片做全螢幕背景 👇👇 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), /* 薄薄的黑色遮罩，確保文字掣清晰 */
                url('https://drive.google.com/uc?export=download&id=1MvE2rYpF9Tj9dssjRd_eentiIBn4hUeU');
            background-size: cover; /* 鋪滿全畫面 */
            background-position: center; /* 置中 */
            background-repeat: no-repeat;
            background-attachment: fixed; /* 滑動時固定背景 */
            background-color: #f4f1e9; /* 如果圖片載入失敗，顯示原本的底色 */
        }

        header {
            margin-top: 20px;
        }

        header h1 {
            font-weight: 500;
            margin-bottom: 5px;
            color: #000;
        }

        header p {
            font-size: 0.9rem;
            color: #555;
            margin-top: 0;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        .frequency-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 360px; /* iPhone size constraint */
            margin: 20px 0;
        }

        .freq-card {
            background-color: rgba(255, 255, 255, 0.9); /* 半透明白色，融合背景圖 */
            border-radius: 20px;
            border: none;
            padding: 30px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            aspect-ratio: 1 / 1; /* 保持正方形 */
        }

        .freq-card:active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.7);
        }

        .freq-title {
            color: #007aff; /* Apple Blue for titles */
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .freq-desc {
            color: #555;
            font-size: 0.8rem;
            margin: 0;
            font-weight: 300;
        }

        .timer-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .timer-btn {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #c7c7cc;
            border-radius: 20px;
            padding: 8px 18px;
            color: #1c1c1e;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .timer-btn:active {
            background-color: #e5e5ea;
        }

        .close-btn {
            background-color: white;
            border: 1px solid #ff3b30;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #ff3b30;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .close-btn:active {
            background-color: #ffe5e5;
        }

        footer p {
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
            margin-top: 30px;
            font-weight: 300;
        }

    </style>
</head>
<body>

<header>
    <h1>頻率療癒</h1>
    <p>Frequency Healing</p>
</header>

<section class="frequency-grid">
    <button class="freq-card">
        <h2 class="freq-title">睡眠</h2>
        <p class="freq-desc">432 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">溫習</h2>
        <p class="freq-desc">741 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">止痛</h2>
        <p class="freq-desc">147 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">正面</h2>
        <p class="freq-desc">528 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">安全</h2>
        <p class="freq-desc">396 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">幸福</h2>
        <p class="freq-desc">639 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">平靜</h2>
        <p class="freq-desc">852 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">修復</h2>
        <p class="freq-desc">285 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">靈性</h2>
        <p class="freq-desc">963 Hz</p>
    </button>
</section>

<section class="timer-controls">
    <button class="timer-btn">15 min</button>
    <button class="timer-btn">30 min</button>
    <button class="timer-btn">60 min</button>
    <button class="close-btn">×</button>
</section>

<footer>
    <p>MINIMALIST SOUNDS</p>
</footer>

</body>
</html>
