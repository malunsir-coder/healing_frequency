<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>頻率療癒 Frequency Healing Pro</title>
    <style>
        /* 介面與排版完全保留 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            min-height: 100vh; text-align: center; overflow: hidden;
            background-image: url('https://i.ibb.co/9dTk0jB/e7ae553c-887b-41e5-960a-996f3c864e81.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; background-color: #f4f1e9;
        }

        body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        body > * { position: relative; z-index: 1; }

        .top-right-label {
            position: absolute; top: 25px; right: 25px;
            color: #ffffff; font-size: 1.15rem; font-weight: 600;
            letter-spacing: 1px; text-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        header { margin-top: 50px; }
        header h1 { font-weight: 500; margin-bottom: 5px; color: #ffffff; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        header p { font-size: 0.9rem; color: #ffffff; opacity: 0.8; margin-top: 0; letter-spacing: 0.5px; font-weight: 300; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

        .frequency-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 100%; max-width: 360px; margin: 20px 0;
        }

        .freq-card {
            background-color: rgba(255, 255, 255, 0.75); border-radius: 20px; border: none;
            padding: 30px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s; aspect-ratio: 1 / 1;
        }

        .freq-card.playing {
            background-color: rgba(255, 255, 255, 0.95); transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
        }

        .freq-title { color: #007aff; font-size: 1.1rem; font-weight: 600; margin: 0 0 5px 0; }
        .freq-desc { color: #555; font-size: 0.8rem; margin: 0; font-weight: 300; }

        .timer-controls { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
        .timer-btn {
            background-color: rgba(255, 255, 255, 0.85); border: 1px solid #c7c7cc; border-radius: 20px;
            padding: 8px 18px; color: #1c1c1e; font-size: 0.9rem; cursor: pointer; transition: background-color 0.2s;
        }
        .timer-btn.active { background-color: #007aff; color: white; border-color: #007aff; }

        .close-btn {
            background-color: white; border: 1px solid #ff3b30; border-radius: 50%;
            width: 36px; height: 36px; color: #ff3b30; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        footer p { font-size: 0.75rem; color: #444; letter-spacing: 1px; margin-top: 30px; font-weight: 400; text-shadow: 0 1px 2px rgba(255,255,255,0.4); }

    </style>
</head>
<body>

<audio id="bg-audio" loop playsinline src="data:audio/mpeg;base64,//OExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq/zRMAAAABAAABpAAA//OExEQAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq"></audio>

<div class="top-right-label">台東 72 小時</div>

<header>
    <h1>頻率療癒</h1>
    <p>Frequency Healing</p>
</header>

<section class="frequency-grid">
    <button class="freq-card" onclick="toggleFrequency(432, this, '睡眠')">
        <h2 class="freq-title">睡眠</h2>
        <p class="freq-desc">432 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(741, this, '溫習')">
        <h2 class="freq-title">溫習</h2>
        <p class="freq-desc">741 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(147, this, '止痛')">
        <h2 class="freq-title">止痛</h2>
        <p class="freq-desc">147 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(528, this, '正面')">
        <h2 class="freq-title">正面</h2>
        <p class="freq-desc">528 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(396, this, '安全')">
        <h2 class="freq-title">安全</h2>
        <p class="freq-desc">396 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(639, this, '幸福')">
        <h2 class="freq-title">幸福</h2>
        <p class="freq-desc">639 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(852, this, '平靜')">
        <h2 class="freq-title">平靜</h2>
        <p class="freq-desc">852 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(285, this, '修復')">
        <h2 class="freq-title">修復</h2>
        <p class="freq-desc">285 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(963, this, '靈性')">
        <h2 class="freq-title">靈性</h2>
        <p class="freq-desc">963 Hz</p>
    </button>
</section>

<section class="timer-controls">
    <button class="timer-btn" onclick="setTimer(15, this)">15 min</button>
    <button class="timer-btn" onclick="setTimer(30, this)">30 min</button>
    <button class="timer-btn" onclick="setTimer(60, this)">60 min</button>
    <button class="close-btn" onclick="stopAll()">×</button>
</section>

<footer>
    <p>MINIMALIST SOUNDS</p>
</footer>

<script>
    let audioCtx = null;
    let activeOscillator = null; 
    let activeGain = null;
    let currentFreq = null;
    let timerTimeout = null;
    const bgAudio = document.getElementById('bg-audio');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 啟動鎖屏音樂控制器 (Media Session API)
    function setupLockScreen(freq, titleName) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: freq + ' Hz ' + titleName,
                artist: '台東 72 小時',
                album: 'Frequency Healing Pro',
                artwork: [
                    { src: 'https://i.ibb.co/9dTk0jB/e7ae553c-887b-41e5-960a-996f3c864e81.jpg', sizes: '512x512', type: 'image/jpeg' }
                ]
            });

            navigator.mediaSession.setActionHandler('pause', function() {
                stopAll();
            });
            // Web Audio 在鎖屏 resume 較複雜，通常提供 pause 就足夠
        }
    }

    function toggleFrequency(freq, btn, titleName) {
        initAudio();
        
        if (currentFreq === freq) {
            stopAll();
            return;
        }

        stopAll();

        // 啟動隱藏無聲音軌 (迫使 iOS 保持背景運行)
        bgAudio.play().catch(e => console.log("Bg audio play failed:", e));

        // 啟動真實頻率
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.5);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();

        activeOscillator = osc;
        activeGain = gain;
        currentFreq = freq;

        // 設定鎖屏資訊
        setupLockScreen(freq, titleName);

        btn.classList.add('playing');
    }

    function stopAll() {
        // 停止隱藏無聲音軌
        bgAudio.pause();

        const oldOsc = activeOscillator;
        const oldGain = activeGain;

        if (oldGain && oldOsc) {
            oldGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            setTimeout(() => {
                try { oldOsc.stop(); } catch(e) {}
            }, 300);
        }

        activeOscillator = null;
        activeGain = null;
        currentFreq = null;

        document.querySelectorAll('.freq-card').forEach(card => card.classList.remove('playing'));
        
        if (timerTimeout) {
            clearTimeout(timerTimeout);
            timerTimeout = null;
        }
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
    }

    function setTimer(minutes, btn) {
        initAudio();
        
        if (!activeOscillator) {
            alert("請先選擇一個頻率播放，再設定時間");
            return;
        }
        
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (timerTimeout) clearTimeout(timerTimeout);
        
        timerTimeout = setTimeout(() => {
            stopAll();
        }, minutes * 60 * 1000);
    }
</script>

</body>
</html>
