<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>頻率療癒 Frequency Healing Pro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            min-height: 100vh; text-align: center; overflow: hidden;
            /* 背景圖使用你的 ImgBB 直接連結 */
            background-image: url('https://i.ibb.co/9dTk0jB/e7ae553c-887b-41e5-960a-996f3c864e81.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; background-color: #f4f1e9;
        }

        /* 朦朧霧氣層 (Blur + Haze) */
        body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        /* 👇 右上角標籤 (已放大字體) 👇 */
        .top-right-label {
            position: absolute; top: 25px; right: 25px;
            color: #ffffff; 
            font-size: 1.15rem; /* 由 0.8rem 放大到 1.15rem */
            font-weight: 600;
            letter-spacing: 1px; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        header { margin-top: 50px; position: relative; }
        header h1 { color: #ffffff; font-weight: 500; margin-bottom: 5px; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        header p { color: #ffffff; opacity: 0.9; font-size: 0.9rem; letter-spacing: 0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

        .frequency-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 100%; max-width: 360px; margin: 20px 0; position: relative;
        }

        .freq-card {
            background-color: rgba(255, 255, 255, 0.75); border-radius: 20px; border: none;
            padding: 30px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; aspect-ratio: 1 / 1;
        }

        /* 播放中狀態 UI */
        .freq-card.playing {
            background-color: rgba(255, 255, 255, 0.95);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
        }

        .freq-title { color: #007aff; font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .freq-desc { color: #555; font-size: 0.8rem; font-weight: 300; }

        .timer-controls { display: flex; align-items: center; gap: 10px; margin-top: 20px; position: relative; }
        .timer-btn {
            background-color: rgba(255, 255, 255, 0.85); border: 1px solid #c7c7cc;
            border-radius: 20px; padding: 8px 18px; color: #1c1c1e; font-size: 0.9rem; cursor: pointer;
        }
        .timer-btn.active { background-color: #007aff; color: white; border-color: #007aff; }

        .close-btn {
            background-color: white; border: 1px solid #ff3b30; border-radius: 50%;
            width: 36px; height: 36px; color: #ff3b30; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        footer { margin-top: 30px; position: relative; }
        footer p { font-size: 0.75rem; color: #333; letter-spacing: 1px; font-weight: 500; }

    </style>
</head>
<body>

<div class="top-right-label">台東 72 小時</div>

<header>
    <h1>頻率療癒</h1>
    <p>Frequency Healing</p>
</header>

<section class="frequency-grid">
    <button class="freq-card" onclick="toggleFrequency(432, this)">
        <h2 class="freq-title">睡眠</h2>
        <p class="freq-desc">432 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(741, this)">
        <h2 class="freq-title">溫習</h2>
        <p class="freq-desc">741 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(147, this)">
        <h2 class="freq-title">止痛</h2>
        <p class="freq-desc">147 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(528, this)">
        <h2 class="freq-title">正面</h2>
        <p class="freq-desc">528 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(396, this)">
        <h2 class="freq-title">安全</h2>
        <p class="freq-desc">396 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(639, this)">
        <h2 class="freq-title">幸福</h2>
        <p class="freq-desc">639 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(852, this)">
        <h2 class="freq-title">平靜</h2>
        <p class="freq-desc">852 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(285, this)">
        <h2 class="freq-title">修復</h2>
        <p class="freq-desc">285 Hz</p>
    </button>
    <button class="freq-card" onclick="toggleFrequency(963, this)">
        <h2 class="freq-title">靈性</h2>
        <p class="freq-desc">963 Hz</p>
    </button>
</section>

<section class="timer-controls">
    <button class="timer-btn" onclick="setTimer(15, this)">15 min</button>
    <button class="timer-btn" onclick="setTimer(30, this)">30 min</button>
    <button class="timer-btn" onclick="setTimer(60, this)">60 min</button>
    <button class="close-btn" onclick="stopAll()">×</button>
</section>

<footer>
    <p>MINIMALIST SOUNDS</p>
</footer>

<script>
    let audioCtx = null;
    let oscillator = null;
    let gainNode = null;
    let currentFreq = null;
    let timerTimeout = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function toggleFrequency(freq, btn) {
        initAudio();
        if (currentFreq === freq) {
            stopAll();
            return;
        }
        stopAll();

        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.5);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        currentFreq = freq;
        btn.classList.add('playing');
    }

    function stopAll() {
        if (gainNode) {
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            setTimeout(() => { if (oscillator) oscillator.stop(); }, 300);
        }
        document.querySelectorAll('.freq-card').forEach(card => card.classList.remove('playing'));
        currentFreq = null;
        if (timerTimeout) { clearTimeout(timerTimeout); timerTimeout = null; }
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
    }

    function setTimer(minutes, btn) {
        stopAll();
        document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        alert(`已設定 ${minutes} 分鐘定時`);
        timerTimeout = setTimeout(() => { stopAll(); }, minutes * 60 * 1000);
    }
</script>

</body>
</html>
