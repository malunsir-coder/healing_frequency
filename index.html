<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>頻率療癒 Frequency Healing Pro</title>
    <style>
        /* Apple-like minimalist UI structure */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            
            /* 👇 背景設定：使用你的 ImgBB 直接連結 👇 */
            background-image: url('https://i.ibb.co/9dTk0jB/e7ae553c-887b-41e5-960a-996f3c864e81.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #f4f1e9;
        }

        /* 👇👇 [要求 3] 加一層朦朧層 Layer (Haze + Blur) 👇👇 */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.2); /* 霧氣 (Haze) */
            backdrop-filter: blur(8px); /* 朦朧 (Blur) */
            -webkit-backdrop-filter: blur(8px); /* 為 Safari 加前景 blur */
            z-index: -1; /* 確保內容在層上面 */
        }

        /* 👇👇 [要求 2] 右上角文字 「台東 72 小時」 👇👇 */
        .top-right-label {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #ffffff; /* 白色 */
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5); /* 陰影，確保清晰 */
        }

        header {
            margin-top: 50px; /* 給右上角文字留位 */
            position: relative;
        }

        header h1 {
            font-weight: 500;
            margin-bottom: 5px;
            
            /* 👇👇 [要求 1] 轉白色字 👇👇 */
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4); /* 加強陰影，確保在 photo 上清晰 */
        }

        header p {
            font-size: 0.9rem;
            
            /* 👇👇 [要求 1] 轉清楚睇到嘅字 (白色+陰影) 👇👇 */
            color: #ffffff;
            opacity: 0.8; /* 少少透明，更有氣氛 */
            margin-top: 0;
            letter-spacing: 0.5px;
            font-weight: 300;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        .frequency-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 360px;
            margin: 20px 0;
            position: relative;
        }

        .freq-card {
            /* 提高透明度，讓背景相片更多地透出來 */
            background-color: rgba(255, 255, 255, 0.75); 
            border-radius: 20px;
            border: none;
            padding: 30px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 加強陰影，讓卡片更突出 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            aspect-ratio: 1 / 1;
        }

        .freq-card:active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.6);
        }

        .freq-title {
            color: #007aff;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .freq-desc {
            color: #555;
            font-size: 0.8rem;
            margin: 0;
            font-weight: 300;
        }

        .timer-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            position: relative;
        }

        .timer-btn {
            background-color: rgba(255, 255, 255, 0.85);
            border: 1px solid #c7c7cc;
            border-radius: 20px;
            padding: 8px 18px;
            color: #1c1c1e;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .timer-btn:active {
            background-color: #e5e5ea;
        }

        .close-btn {
            background-color: white;
            border: 1px solid #ff3b30;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #ff3b30;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        footer {
            margin-top: 30px;
            position: relative;
        }

        footer p {
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 1px;
            font-weight: 400;
            text-shadow: 0 1px 2px rgba(255,255,255,0.4); /* 加強陰影，確保文字易讀 */
        }

    </style>
</head>
<body>

<div class="top-right-label">台東 72 小時</div>

<header>
    <h1>頻率療癒</h1>
    <p>Frequency Healing</p>
</header>

<section class="frequency-grid">
    <button class="freq-card">
        <h2 class="freq-title">睡眠</h2>
        <p class="freq-desc">432 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">溫習</h2>
        <p class="freq-desc">741 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">止痛</h2>
        <p class="freq-desc">147 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">正面</h2>
        <p class="freq-desc">528 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">安全</h2>
        <p class="freq-desc">396 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">幸福</h2>
        <p class="freq-desc">639 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">平靜</h2>
        <p class="freq-desc">852 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">修復</h2>
        <p class="freq-desc">285 Hz</p>
    </button>
    <button class="freq-card">
        <h2 class="freq-title">靈性</h2>
        <p class="freq-desc">963 Hz</p>
    </button>
</section>

<section class="timer-controls">
    <button class="timer-btn">15 min</button>
    <button class="timer-btn">30 min</button>
    <button class="timer-btn">60 min</button>
    <button class="close-btn">×</button>
</section>

<footer>
    <p>MINIMALIST SOUNDS</p>
</footer>

</body>
</html>
